# Jekyll configuration for GitHub Pages
title: Jekyll POC
description: A Jekyll site using the Simplex theme
url: "https://patelkunal.github.io"
baseurl: "/jekyll-poc"
repository: patelkunal/jekyll-poc

# Theme configuration
remote_theme: andreondra/jekyll-theme-simplex

# Simplex theme specific settings
logo_img: # Optional: /assets/img/icons/logo.svg - if not specified, title will be displayed
copyright: © Kunal Patel 2025

# Plugins
plugins:
  - jekyll-remote-theme
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Markdown processor
markdown: kramdown
highlighter: rouge

# Exclude files from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - README.md

# Include files that start with underscore
include:
  - _pages

# Collections
collections:
  category:
    output: true
  authors:
    output: false

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Kunal Patel"
  - scope:
      path: ""
      type: "category"
    values:
      layout: "category"

# Site settings
author: Kunal Patel
email: kunal@example.com
twitter_username: patelkunal
github_username: patelkunal

# Build settings
safe: true
